<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>Todoアプリ</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container mt-4" th:object="${task}">
        <div class="card">
            <div class="card-header" th:text="'#'+ *{id}"></div>
            <div class="card-body">
                <h5 class="card-title" th:text="*{title}"></h5>
                <p class="card-text">
                    <span th:text="*{description}"></span>
                </p>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <strong>Status</strong>
                    <span th:text="*{status}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Deadline</strong>
                    <span th:text="*{deadline}"></span>
                </li>
            </ul>
            <div class="card-footer">
                <small class="text-muted">
                    <strong>Created</strong>
                    <span th:text="${#temporals.format(task.createdAt,'yyyy/MM/dd HH:mm')}"></span>
                </small>
            </div>
        </div>
        <div class="mt-3">
            <a class="btn btn-primary " th:href="@{/tasks/{id}/edit(id=*{id})}">編集</a>
            <form th:action="@{/tasks/{id}(id=${id})}"
                  th:method="delete"
                  style="display: inline;">
                <button class="btn btn-danger">削除</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
