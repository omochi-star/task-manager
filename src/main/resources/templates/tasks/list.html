<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>Todoアプリ</title>
</head>
<body>
<section layout:fragment="content">
    <div class="mt-3 card">
        <div class="card-header">
            検索
        </div>
        <div class="card-body ">
            <form role="search" th:action="@{/tasks}" method="get" th:object="${searchDTO}">
                <input class="form-control me-2" type="search" placeholder="タイトル" aria-label="Search"
                       id="titleSearch"
                       th:field="*{title}">
                <div class="btn-group mt-3">
                    <input class="btn-check" type="checkbox" id="statusSearchTodo" name="status"
                           value="TODO" th:checked="*{isChecked('TODO')}">
                    <label class="btn btn-outline-primary" for="statusSearchTodo">TODO</label>
                    <input class="btn-check" type="checkbox" id="statusSearchDoing" name="status"
                           value="DOING" th:checked="*{isChecked('DOING')}">
                    <label class="btn btn-outline-primary" for="statusSearchDoing">DOING</label>
                    <input class="btn-check" type="checkbox" id="statusSearchDone" name="status"
                           value="DONE" th:checked="*{isChecked('DONE')}">
                    <label class="btn btn-outline-primary" for="statusSearchDone">DONE</label>
                </div>
                <select class="form-select mt-3" aria-label="Default select example" th:field="*{sort}">
                    <option value="">並び替えなし</option>
                    <option value="deadline_asc">期限が早い順</option>
                    <option value="deadline_desc">期限が遅い順</option>
                </select>
                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">Search</button>
                </div>
            </form>
        </div>
    </div>
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Title</th>
            <th scope="col">Status</th>
            <th scope="col">Deadline</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${taskList}"
            th:onclick="|location.href='@{/tasks/{id}(id=*{id})}'|"
            style="cursor:pointer"
            th:object="${task}">
            <td><a th:text="'#'+ *{id}"></a></td>
            <td><a th:text="*{title}"></a></td>
            <td th:text="*{status}"></td>
            <td><a th:text="*{deadline}"></a></td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/tasks/create}" class="btn btn-primary">新規作成</a>
</section>
</body>
</html>
